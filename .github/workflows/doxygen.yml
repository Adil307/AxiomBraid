name: Doxygen Documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Doxyfile"
      - "README.md"
      - "src/axiombraid/**"
      - "docs/**"
      - ".github/workflows/doxygen.yml"
  pull_request:
    paths:
      - "Doxyfile"
      - "README.md"
      - "src/axiombraid/**"
      - "docs/**"
      - ".github/workflows/doxygen.yml"

permissions:
  contents: read

jobs:
  build-doxygen:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen documentation
        run: |
          mkdir -p docs/doxygen
          doxygen Doxyfile
          test -f docs/doxygen/html/index.html

      - name: Upload Doxygen HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiombraid-2.0.0-doxygen-html
          path: docs/doxygen/html
          if-no-files-found: error
          retention-days: 30

      - name: Upload Doxygen warnings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axiombraid-2.0.0-doxygen-warnings
          path: docs/doxygen/doxygen-warnings.log
          if-no-files-found: ignore
          retention-days: 30
