analysis:
  high_cardinality_threshold: 0.9
  min_unique_for_high_cardinality: 3
  structured_identifier_threshold: 0.8
  low_missing_threshold: 5.0
  high_missing_threshold: 30.0
  outlier_iqr_multiplier: 1.5
  min_outlier_sample_size: 4
  date_like_threshold: 0.8
  min_date_like_non_missing: 3
performance:
  mode: auto
  sample_rows: 50000
  strategy: random
  random_state: 42
report:
  language: en
  html_theme: light
  formats:
  - json
  - html
batch:
  recursive: false
  continue_on_error: true
  workers: 1
cache:
  enabled: false
  directory: .axiombraid_cache
